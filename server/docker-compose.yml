services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/conf.d:/etc/caddy/conf.d:ro
      - ./site:/srv/site:ro
      - caddy_data:/data
      - caddy_config:/config

  api:
    build: ./api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data

  kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - kuma_data:/app/data

  # Личный XHTTP-узел за Caddy. Слушает только внутри docker-сети (порт наружу
  # НЕ публикуется) — снаружи дверь одна: 443 через Caddy по секретному пути.
  # Конфиг генерит xray-setup.sh; профиль опционален — без него сайт/пуши не
  # трогаются вообще.
  xray:
    image: ghcr.io/xtls/xray-core:latest
    restart: unless-stopped
    profiles: ["xray"]
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
    command: ["run", "-c", "/etc/xray/config.json"]

volumes:
  caddy_data:
  caddy_config:
  kuma_data:
