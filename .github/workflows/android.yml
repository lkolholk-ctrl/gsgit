name: Android Release CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish a GitHub Release from main after a successful build
        required: true
        default: false
        type: boolean

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  # Never interrupt a main release while assets are being signed or published.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  release-build:
    # GitHub does not expose repository secrets to pull requests from forks.
    # Skipping those runs is safer than publishing an unsigned APK as release.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    env:
      RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      ORG_GRADLE_PROJECT_GSGIT_RELEASE_STORE_PASSWORD: ${{ secrets.GSGIT_RELEASE_STORE_PASSWORD }}
      ORG_GRADLE_PROJECT_GSGIT_RELEASE_KEY_ALIAS: ${{ secrets.GSGIT_RELEASE_KEY_ALIAS }}
      ORG_GRADLE_PROJECT_GSGIT_RELEASE_KEY_PASSWORD: ${{ secrets.GSGIT_RELEASE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Read and validate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^GSGIT_VERSION_NAME=//p' gradle.properties | tr -d '\r' | tail -n 1)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            printf '::error::Invalid or missing GSGIT_VERSION_NAME: %s\n' "$version"
            exit 1
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'tag=v%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Require a new release tag
        if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)) }}
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          if git rev-parse --quiet --verify "refs/tags/$TAG_NAME" >/dev/null; then
            printf '::error::Release tag %s already exists. Bump GSGIT_VERSION_NAME.\n' "$TAG_NAME"
            exit 1
          fi

      - name: Validate release signing secrets
        shell: bash
        run: |
          missing=()
          for name in \
            RELEASE_KEYSTORE_BASE64 \
            ORG_GRADLE_PROJECT_GSGIT_RELEASE_STORE_PASSWORD \
            ORG_GRADLE_PROJECT_GSGIT_RELEASE_KEY_ALIAS \
            ORG_GRADLE_PROJECT_GSGIT_RELEASE_KEY_PASSWORD
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            printf '::error::Missing release signing secrets: %s\n' "${missing[*]}"
            exit 1
          fi

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: android-actions/setup-android@v4
      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;26.3.11579264" "cmake;3.22.1"
      - name: Restore release keystore
        shell: bash
        run: |
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release.keystore
          test -s release.keystore
      - name: Build signed release APK and AAB
        run: ./gradlew --no-daemon :app:assembleRelease :app:bundleRelease --stacktrace

      - name: Verify signatures and prepare release assets
        env:
          VERSION_NAME: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t apks < <(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print)
          mapfile -t aabs < <(find app/build/outputs/bundle/release -maxdepth 1 -type f -name '*.aab' -print)
          if (( ${#apks[@]} != 1 )); then
            printf '::error::Expected exactly one release APK, found %d\n' "${#apks[@]}"
            exit 1
          fi
          if (( ${#aabs[@]} != 1 )); then
            printf '::error::Expected exactly one release AAB, found %d\n' "${#aabs[@]}"
            exit 1
          fi
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose --print-certs "${apks[0]}"

          aab_verify_output="$(jarsigner -verify "${aabs[0]}" 2>&1)"
          printf '%s\n' "$aab_verify_output"
          if ! grep -Fq 'jar verified.' <<< "$aab_verify_output"; then
            printf '::error::AAB signature verification failed.\n'
            exit 1
          fi

          mkdir -p dist
          cp "${apks[0]}" "dist/GsGit-${VERSION_NAME}.apk"
          cp "${aabs[0]}" "dist/GsGit-${VERSION_NAME}.aab"
          (
            cd dist
            sha256sum "GsGit-${VERSION_NAME}.apk" "GsGit-${VERSION_NAME}.aab" > SHA256SUMS.txt
          )

      - uses: actions/upload-artifact@v7
        with:
          name: gsgit-release-${{ github.run_number }}
          path: dist/
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Remove restored keystore
        if: ${{ always() }}
        run: rm -f release.keystore

  publish-release:
    name: Publish GitHub Release
    needs: release-build
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION_NAME: ${{ needs.release-build.outputs.version }}
      TAG_NAME: ${{ needs.release-build.outputs.tag }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: gsgit-release-${{ github.run_number }}
          path: dist

      - name: Verify downloaded assets
        shell: bash
        run: |
          set -euo pipefail
          test -f "dist/GsGit-${VERSION_NAME}.apk"
          test -f "dist/GsGit-${VERSION_NAME}.aab"
          test -f dist/SHA256SUMS.txt
          (cd dist && sha256sum --check SHA256SUMS.txt)

      - name: Publish release with generated changelog
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$TAG_NAME" \
            "dist/GsGit-${VERSION_NAME}.apk#GsGit ${VERSION_NAME} APK" \
            "dist/GsGit-${VERSION_NAME}.aab#GsGit ${VERSION_NAME} Android App Bundle" \
            "dist/SHA256SUMS.txt#SHA-256 checksums" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "GsGit ${VERSION_NAME}" \
            --notes "Signed Android release. APK and AAB signatures were verified by GitHub Actions." \
            --generate-notes \
            --fail-on-no-commits \
            --latest
