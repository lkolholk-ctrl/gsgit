name: Android Release CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish a public release to gsgit-releases from main
        required: true
        default: false
        type: boolean

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  # Never interrupt a main release while assets are being signed or published.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  # Публичная витрина релизов (код приватный, APK раздаём отсюда).
  RELEASES_REPO: lkolholk-ctrl/gsgit-releases

jobs:
  release-build:
    # GitHub does not expose repository secrets to pull requests from forks.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      # Нужно для rolling `dev`-пререлиза в этом (приватном) репозитории.
      contents: write
    env:
      RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      ORG_GRADLE_PROJECT_GSGIT_RELEASE_STORE_PASSWORD: ${{ secrets.GSGIT_RELEASE_STORE_PASSWORD }}
      ORG_GRADLE_PROJECT_GSGIT_RELEASE_KEY_ALIAS: ${{ secrets.GSGIT_RELEASE_KEY_ALIAS }}
      ORG_GRADLE_PROJECT_GSGIT_RELEASE_KEY_PASSWORD: ${{ secrets.GSGIT_RELEASE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Read and validate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^GSGIT_VERSION_NAME=//p' gradle.properties | tr -d '\r' | tail -n 1)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            printf '::error::Invalid or missing GSGIT_VERSION_NAME: %s\n' "$version"
            exit 1
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'tag=v%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Determine if this run publishes a public release
        id: mode
        shell: bash
        run: |
          publish=false
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            if [[ "${{ github.event_name }}" == "push" ]] || \
               [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.publish_release }}" == "true" ]]; then
              publish=true
            fi
          fi
          printf 'publish=%s\n' "$publish" >> "$GITHUB_OUTPUT"

      - name: Require a new release tag in the showcase repo
        if: ${{ steps.mode.outputs.publish == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" --repo "$RELEASES_REPO" >/dev/null 2>&1; then
            printf '::error::Release %s already exists in %s. Bump GSGIT_VERSION_NAME.\n' "$TAG_NAME" "$RELEASES_REPO"
            exit 1
          fi

      - name: Validate release signing secrets
        shell: bash
        run: |
          missing=()
          for name in \
            RELEASE_KEYSTORE_BASE64 \
            ORG_GRADLE_PROJECT_GSGIT_RELEASE_STORE_PASSWORD \
            ORG_GRADLE_PROJECT_GSGIT_RELEASE_KEY_ALIAS \
            ORG_GRADLE_PROJECT_GSGIT_RELEASE_KEY_PASSWORD
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            printf '::error::Missing release signing secrets: %s\n' "${missing[*]}"
            exit 1
          fi

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: android-actions/setup-android@v4
      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;26.3.11579264" "cmake;3.22.1"
      - name: Restore release keystore
        shell: bash
        run: |
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release.keystore
          test -s release.keystore
      - name: Build signed release APK and AAB
        run: ./gradlew --no-daemon :app:assembleRelease :app:bundleRelease --stacktrace

      - name: Verify signatures and prepare release assets
        env:
          VERSION_NAME: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t apks < <(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print)
          mapfile -t aabs < <(find app/build/outputs/bundle/release -maxdepth 1 -type f -name '*.aab' -print)
          if (( ${#apks[@]} != 1 )); then
            printf '::error::Expected exactly one release APK, found %d\n' "${#apks[@]}"
            exit 1
          fi
          if (( ${#aabs[@]} != 1 )); then
            printf '::error::Expected exactly one release AAB, found %d\n' "${#aabs[@]}"
            exit 1
          fi
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose --print-certs "${apks[0]}"

          aab_verify_output="$(jarsigner -verify "${aabs[0]}" 2>&1)"
          printf '%s\n' "$aab_verify_output"
          if ! grep -Fq 'jar verified.' <<< "$aab_verify_output"; then
            printf '::error::AAB signature verification failed.\n'
            exit 1
          fi

          mkdir -p dist
          cp "${apks[0]}" "dist/GsGit-${VERSION_NAME}.apk"
          cp "${aabs[0]}" "dist/GsGit-${VERSION_NAME}.aab"
          (
            cd dist
            sha256sum "GsGit-${VERSION_NAME}.apk" "GsGit-${VERSION_NAME}.aab" > SHA256SUMS.txt
          )

      # ── Тестовые сборки (ветки): rolling `dev`-пререлиз в приватном репо. ──
      # Ассеты релизов не считаются в квоту хранилища Actions (в отличие от
      # артефактов), видны только владельцу. Старый dev-ассет перезаписывается.
      - name: Publish rolling dev build (non-main)
        if: ${{ steps.mode.outputs.publish != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_NAME: ${{ steps.version.outputs.version }}
          RUN_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          gh release delete dev --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag 2>/dev/null || true
          gh release create dev \
            "dist/GsGit-${VERSION_NAME}.apk#GsGit ${VERSION_NAME} (dev build #${RUN_NUMBER})" \
            "dist/SHA256SUMS.txt#SHA-256 checksums" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$SHA" \
            --title "dev build ${VERSION_NAME} (#${RUN_NUMBER})" \
            --notes "Latest CI build from \`${REF_NAME}\`. Not a public release." \
            --prerelease

      # ── Боевой релиз (main): публикация в публичную витрину gsgit-releases. ──
      - name: Publish public release to showcase (main)
        if: ${{ steps.mode.outputs.publish == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          VERSION_NAME: ${{ steps.version.outputs.version }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          # Заметки из коммитов приватного репо (в витрине истории нет).
          # Теги в приватном больше не создаём, поэтому новейший v* = прошлый релиз.
          prev_tag="$(git tag --list 'v*' --sort=-v:refname | sed -n '1p' || true)"
          if [[ -n "$prev_tag" ]]; then range="${prev_tag}..HEAD"; else range="HEAD~30..HEAD"; fi
          notes="$(git log "$range" --no-merges --pretty='- %s' 2>/dev/null \
            | grep -viE '^- (chore|docs|ci)(\(|:)' | head -40 || true)"
          [[ -z "$notes" ]] && notes="Signed Android release."
          {
            printf '%s\n\n' "$notes"
            printf 'APK and AAB signatures were verified by GitHub Actions. SHA-256 checksums attached.\n'
          } > release-notes.md
          gh release create "$TAG_NAME" \
            "dist/GsGit-${VERSION_NAME}.apk#GsGit ${VERSION_NAME} APK" \
            "dist/GsGit-${VERSION_NAME}.aab#GsGit ${VERSION_NAME} Android App Bundle" \
            "dist/SHA256SUMS.txt#SHA-256 checksums" \
            --repo "$RELEASES_REPO" \
            --title "GsGit ${VERSION_NAME}" \
            --notes-file release-notes.md \
            --latest

      - name: Remove restored keystore
        if: ${{ always() }}
        run: rm -f release.keystore
